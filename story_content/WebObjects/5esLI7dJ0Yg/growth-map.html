<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: Poppins, Arial;
  background: #F3F3F3; /* ✅ your required color */
}

/* Main container */
#content {
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

/* Heading */
.heading {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* List items */
.item {
  margin-bottom: 16px;
  font-size: 22px;
  line-height: 1.5;
}

/* Links */
a {
  color: #0056b3;
  font-weight: 600;
  text-decoration: underline;
}

/* Payment */
.payment {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.6;
}

/* Buttons */
.btns {
  margin-top: 25px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn {
  background: #8900C4;
  color: white;
  padding: 14px 22px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="content">
  <!-- fallback loading -->
  <div style="font-size:18px;">Loading your growth map...</div>
</div>

<script>

function renderData(data) {
  if (!data || !data.links) return;

  var html = "";

  html += "<div class='heading'>Your customized growth map:</div>";

  data.links.forEach(function(link, index){
    html += "<div class='item'>" +
      (index+1) + ". <a href='" + link.url + "' target='_blank'>" + link.text + "</a>" +
    "</div>";
  });

  html += "<div class='payment'>" +
    "Please pay the course fees <b>Rs. 1000</b> on the following link and share your payment confirmation screenshot to start taking the courses.<br><br>" +
    "<a href='http://www.instamojo.com/@greytip' target='_blank'>http://www.instamojo.com/@greytip</a>" +
  "</div>";

  html += "<div class='btns'>" +
    "<a class='btn' href='" + data.gmail + "' target='_blank'>Email My Growth Map</a>" +
    "<a class='btn' href='" + data.qa + "' target='_blank'>Q & A</a>" +
  "</div>";

  document.getElementById("content").innerHTML = html;
}

// Listen for Storyline data
window.addEventListener("message", function(event) {
  renderData(event.data);
});

// Safety: retry if data delayed
setTimeout(function(){
  if (document.getElementById("content").innerHTML.includes("Loading")) {
    console.log("Waiting for data...");
  }
}, 1000);

</script>

</body>
</html>
